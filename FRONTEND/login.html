<!-- Registro de usuario existente (login) -->

<!DOCTYPE html>

<html lang="es">
  <head>
    <title>LOGIN</title> <!-- Titulo visible en la pestaña del navegador -->
    <meta charset = "utf-8">
    <meta name = "viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="index.css"> 
  </head>
  <body>

    <section class="hero">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1>Inicia sesión en tu cuenta</h1>
                <p>Accede para gestionar tus reservas y eventos exclusivos.</p>
            </div>
        </div>
    </section>

    <form action="" method="post" class="register">
        <fieldset>
        <div class="register">
            <label for="email">Email: </label>
            <input type="email" name="email" id="email" required />
        </div> 
        <div class="register">
            <label for="password">Contraseña: </label>
            <input type="password" name="password" id="password" required />
        </div> 
        </fieldset>

        <div class="register">
            <button type="submit">Iniciar sesión</button>
        </div>
    </form>
       

    <footer class="footer">
        <p>© 2026 Padel Master Club - Pasión por el deporte</p>
    </footer>


  </body>
</html>
