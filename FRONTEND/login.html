<!-- Registro de usuario existente (login) -->

<!DOCTYPE html>

<html lang="es">
  <head>
    <title>LOGIN</title> <!-- Titulo visible en la pestaña del navegador -->
    <meta charset = "utf-8">
    <meta name = "viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="index.css"> 
  </head>
  <body>

    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="Logo dinámico de ChisPadel con detalles.png" alt="Logo ChisPadel">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="reserva.html">Reservas</a></li>
                <li><a href="disponibilidad.html">Disponibilidad</a></li>
                <li><a href="registro.html">Registro</a></li>
                
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1>Inicia sesión en tu cuenta</h1>
                <p>Accede para gestionar tus reservas y eventos exclusivos.</p>
            </div>
        </div>
    </section>

    <form action="" method="post" id="formLogin" class="register">
        <fieldset>
        <div class="register">
            <label for="email">Email: </label>
            <input type="email" name="email" id="email" required />
        </div> 
        <div class="register">
            <label for="password">Contraseña: </label>
            <input type="password" name="password" id="password" required />
        </div> 
        </fieldset>

        <div class="register">
            <button type="submit">Iniciar sesión</button>
        </div>
    </form>

    <!-- Para su uso en 'usuario.js' -->
    <div id="mensaje" style="display:none;"></div>
       

    <footer class="footer">
        <p>© 2026 ChisPadel- Pasión por el deporte</p>
    </footer>

    <script src="usuario.js"></script>
  </body>
</html>
