<!-- Registro de nuevo usuario (crear cuenta) -->

<!DOCTYPE html>

<html lang="es">
  <head>
    <title>REGISTRO</title> <!-- Titulo visible en la pestaña del navegador -->
    <meta charset = "utf-8">
    <meta name = "viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="index.css"> 
  </head>
  <body>

    <section class="hero">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1>¡Regístrate en nuestra página web!</h1>
                <p>Completa tus datos y crea tu cuenta para reservar pistas y eventos exclusivos.</p>
            </div>
        </div>
    </section>

    <form action="" method="post" id="formRegister" class="register">
    <!-- /auth/register para action cuando añada JavaScript-->
        <fieldset>
        <!--El 'for' utilizado en las 'label' es para ligar mediante el id la entrada con la etiqueta-->
        <!-- "name" es lo que debe coincidir con el nombre usado en la Base de datos -->
        <div class="register">
            <label for="name">Nombre: </label>
            <input type="text" name="nombre" id="name" required />
        </div>
        <div class="register">
            <label for="apellidos">Apellidos: </label>
            <input type="text" name="apellidos" id="apellidos" required />
        </div>
        <div class="register">
            <label for="email">Email: </label>
            <input type="email" name="email" id="email" required />
        </div>
        <div class="register">
            <label for="telefono">Teléfono: </label>
            <input type="tel" name="telefono" id="telefono" required />
        </div>  
        <div class="register">
            <label for="password">Contraseña: </label>
            <input type="password" name="password" id="password" required />
        </div> 
        <div class="register">
            <label for="confirmar">Confirmar contraseña: </label>
            <input type="password" name="confirmar" id="confirmar" required />
        </div> 
        </fieldset>

        <div class="register">
            <button type="submit">Crear cuenta</button>
        </div>
    </form>

    <!-- Para su uso en 'usuario.js' -->
    <div id="mensaje" style="display:none;"></div>
    
    <p class="p-registro"> 
        <b>¿Ya tienes cuenta?</b> <a href= "login.html">Inicia Sesión</a>
    </p>

        

    <footer class="footer">
        <p>© 2026 ChisPadel- Pasión por el deporte</p>
    </footer>


  </body>
</html>
