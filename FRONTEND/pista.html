

<!DOCTYPE html>
<html lang="es">

  <head>
    <title>Pista</title> 
    <meta charset = "utf-8">
    <meta name = "viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="index.css"> 
  </head>
  <body>

     <section class="hero">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1>Las pistas de pádel</h1>
                <p>Crea tu pista de pádel aquí</p>
            </div>
        </div>
    </section>
    <a>
         <img src=https://skypadel.com/wp-content/uploads/2023/05/pista-pro-padel-league-2-1-1080x675.jpg
         alt="Foto de una pista"
         style="width: 100%; height: auto;">
    </a>

    <div class="pista-box">
  <h2>Pista - only ADMIN can change here</h2>

  <div class="pista-item">
    <span class="label">ID:</span> 
     <select id="ID">
    <option value="">Selecciona una pista</option>
</select>
  </div>

  <div class="pista-item">
    <span class="label">Ubicación:</span> 
    <input type = "text" name = "Ubicación" id="ubicacion" required/>
  </div>

  <div class="pista-item">
    <span class="label">Precio por hora:</span> 
    <input type = "text" name = "Precio" id="precio" required/>
  </div>

  <div class="pista-item">
    <span class="label">Activa:</span> 
    <input type = "text" name = "activa" id="activa" required/>
  </div>

  <div class="pista-item">
    <span class="label">Fecha de alta:</span> 
    <input type = "date" name = "date" id="date" required/>
  </div>

  
  <button class="pista-button">Guardar</button>
 <button onclick="deleteCourt()">Eliminar pista</button>





<script src="pista.js"></script>
</body>
</html>
